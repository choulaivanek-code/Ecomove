name: CI — EcoMove API

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  tests:
    name: Build & Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD:
          MYSQL_DATABASE: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Run Tests
        run: |
          mvn -B test \
            -Dspring.datasource.url="jdbc:mysql://localhost:3306/ecomove?useSSL=false&allowPublicKeyRetrieval=true" \
            -Dspring.datasource.username=root \
            -Dspring.datasource.password=ecomove123