name: CI — EcoMove API

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # =============================================
  # JOB 1 : Tests
  # =============================================
  tests:
    name: Build & Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ecomove
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h"127.0.0.1" -uroot -proot --silent && break
            echo "Waiting for MySQL..."
            sleep 2
          done

      - name: Run Tests
        run: |
          mvn -B test \
            -Dspring.datasource.url="jdbc:mysql://localhost:3306/ecomove?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC" \
            -Dspring.datasource.username=root \
            -Dspring.datasource.password=root

  # =============================================
  # JOB 2 : Docker Build & Push
  # Tourne seulement si tests OK
  # et seulement sur la branche main
  # =============================================
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ecomove-api:latest
            ${{ secrets.DOCKER_USERNAME }}/ecomove-api:${{ github.sha }}